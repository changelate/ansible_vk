---
- name: Install chrony
  ansible.builtin.dnf:
    name: chrony
    state: present
  when: ansible_os_family == "RedHat"
  tags: [chrony, install]

- name: Deploy chrony server configuration
  ansible.builtin.copy:
    src: chrony-server.conf
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
    backup: yes
  notify: Restart chrony
  tags: [chrony, config]

- name: Ensure chrony is enabled and running
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
  tags: [chrony, service]